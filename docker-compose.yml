version: "3.8"

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: kg_robot_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/your_password_here
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p your_password_here 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - kg_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg_robot_api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: your_password_here
      NEO4J_DATABASE: neo4j
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:5200/v1}
      LLM_API_KEY: local
      LLM_MODEL: qwen2.5-7b
      LOG_LEVEL: INFO
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - kg_network

  ui:
    image: nginx:alpine
    container_name: kg_robot_ui
    ports:
      - "3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - kg_network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:

networks:
  kg_network:
    driver: bridge
