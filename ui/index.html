<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业机器人知识图谱 — Industrial Robot KG</title>

<!-- D3.js -->
<script src="https://cdn.bootcdn.net/ajax/libs/d3/7.9.0/d3.min.js"></script>

<!-- Design System -->
<link rel="stylesheet" href="/css/style.css">

</head>
<body>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<div id="sidebar">
  <div class="brand">
    <span class="brand-mark">KG</span>
    <span class="brand-divider"></span>
    <span class="brand-sub">Industrial Robot</span>
  </div>

  <nav>
    <a class="active" data-view="graph" onclick="switchView('graph')">
      <span class="nav-icon">&#x2261;</span> 图谱
    </a>
    <a data-view="chat" onclick="switchView('chat')">
      <span class="nav-icon">&Sigma;</span> 问答
    </a>
    <a data-view="graph" onclick="switchView('graph'); setTimeout(loadFullGraph, 100)">
      <span class="nav-icon">&#x2304;</span> 全景
    </a>
  </nav>

  <div id="graph-panels" class="visible">

    <!-- Search -->
    <div class="side-panel">
      <h4>实体搜索</h4>
      <div class="side-search">
        <input type="text" id="searchInput" placeholder="型号、品牌、工艺..."
               onkeydown="if(event.key==='Enter')searchEntities()" />
        <button onclick="searchEntities()">搜索</button>
      </div>
      <div class="node-list" id="searchResults" style="margin-top:8px;"></div>
    </div>

    <!-- Path -->
    <div class="side-panel">
      <h4>路径查询</h4>
      <div class="path-finder">
        <select id="pathSource" onchange="updatePathTarget()">
          <option value="">选择起点...</option>
        </select>
        <select id="pathTarget">
          <option value="">选择终点...</option>
        </select>
        <button onclick="findPath()">最短路径</button>
      </div>
    </div>

    <!-- Compare -->
    <div class="side-panel">
      <h4>对比分析</h4>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <input type="text" id="compareA" placeholder="实体A..." />
        <input type="text" id="compareB" placeholder="实体B..." />
        <button onclick="compareEntities()" class="btn-secondary">生成报告</button>
        <div class="compare-export-row">
          <button id="compare-export-pdf" onclick="exportPdf()" class="btn-export">导出 PDF</button>
          <button id="compare-export-docx" onclick="exportDocx()" class="btn-export">导出 DOCX</button>
        </div>
      </div>
      <div id="compareResult" style="margin-top:6px;font-size:11px;color:var(--text-dim);max-height:186px;overflow-y:auto;line-height:1.7;"></div>
    </div>

    <!-- Stats -->
    <div class="side-panel">
      <h4>统计 <button class="refresh-logs-btn" onclick="loadQuality()" style="float:right;">质量</button></h4>
      <div class="stats-grid">
        <div class="stat-cell"><div class="val" id="statNodes">-</div><div class="lbl">节点</div></div>
        <div class="stat-cell"><div class="val" id="statRels">-</div><div class="lbl">关系</div></div>
        <div class="stat-cell"><div class="val" id="statLabels">-</div><div class="lbl">标签</div></div>
        <div class="stat-cell"><div class="val" id="statRelTypes">-</div><div class="lbl">关系类型</div></div>
      </div>
    </div>

    <!-- Node Detail -->
    <div class="side-panel">
      <h4>节点详情</h4>
      <div id="nodeDetail">点击节点查看详情</div>
    </div>

    <!-- Ingest -->
    <div class="side-panel">
      <h4>数据摄入</h4>
      <div class="ingest-area">
        <textarea id="ingestText" placeholder="粘贴工业机器人文本...&#10;例如：FANUC M-10iA 是一款6轴弧焊机器人，10kg负载，1420mm臂展，0.03mm重复定位精度"></textarea>
        <div class="ingest-actions">
          <button class="btn-primary" onclick="ingestText()">提交</button>
          <button class="btn-secondary" onclick="document.getElementById('ingestFile').click()">上传文件 (可多选)</button>
        </div>
        <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--text-dim);cursor:pointer">
          <input type="checkbox" id="ingestUseLLM" style="accent-color:var(--accent)" /> AI提取 (更慢但更准确)
        </label>
        <input type="file" id="ingestFile" accept=".csv,.pdf,.txt,.md,.dwg,.dxf,.step,.stp,.igs,.iges" multiple onchange="ingestFile(this)" style="display:none" />
        <div class="ingest-status" id="ingestStatus"></div>
      </div>
    </div>

    <!-- Upload Log -->
    <div class="side-panel">
      <h4>上传日志 <button class="refresh-logs-btn" onclick="loadIngestLogs()" style="float:right;">刷新</button></h4>
      <div class="log-list" id="logList">点击刷新加载</div>
    </div>

  </div>
</div>

<!-- ============================================================
     MAIN AREA
     ============================================================ -->
<div id="main">

  <!-- Graph View -->
  <div id="graph-view">
    <div id="graph-container">
      <div class="graph-loading" id="graphLoading"><div class="spinner"></div></div>
    </div>
    <div class="graph-tooltip" id="tooltip"></div>
    <div class="graph-controls">
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom –</button>
      <button onclick="resetZoom()">Reset</button>
      <button onclick="loadFullGraph()">全景</button>
    </div>
    <div class="graph-legend" id="legend"></div>
  </div>

  <!-- Chat View -->
  <div id="chat-view">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div class="chat-input-wrap">
        <textarea id="chatInput" rows="1" placeholder="Ask about robots, parts, specs..."
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"></textarea>
        <button id="chatSendBtn" onclick="chatSend()">&uarr;</button>
      </div>
      <div class="chat-hint">Enter send · Shift+Enter newline · RAG-powered</div>
    </div>
  </div>

</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script src="/js/shared.js?v=4"></script>
<script src="/js/graph.js?v=4"></script>
<script src="/js/chat.js?v=4"></script>
<script src="/js/ingest.js?v=4"></script>

<script>
/* ---- View Switching ---- */
function switchView(view) {
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');

  const graphView = document.getElementById('graph-view');
  const chatView  = document.getElementById('chat-view');
  const graphPanels = document.getElementById('graph-panels');

  if (view === 'chat') {
    graphView.classList.add('hidden');
    chatView.classList.add('visible');
    graphPanels.classList.remove('visible');
    if (!_chatInit) { showChatEmpty(); _chatInit = true; }
  } else {
    graphView.classList.remove('hidden');
    chatView.classList.remove('visible');
    graphPanels.classList.add('visible');
    if (!_graphInit) { initGraph(); _graphInit = true; loadStats(); }
    setTimeout(() => {
      if (simulation) { simulation.alpha(0.1).restart(); }
      const cw = document.getElementById('graph-container').clientWidth;
      const ch = document.getElementById('graph-container').clientHeight;
      d3.select('#graph-container svg').attr('width', cw).attr('height', ch);
    }, 80);
  }
}

/* ---- Init ---- */
initGraph(); _graphInit = true;
loadStats();
loadIngestLogs();
setTimeout(loadFullGraph, 300);
</script>

</body>
</html>
