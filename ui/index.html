<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业机器人知识图谱 — Industrial Robot KG</title>

<!-- D3.js -->
<script src="https://cdn.bootcdn.net/ajax/libs/d3/7.9.0/d3.min.js"></script>

<!-- Design System -->
<link rel="stylesheet" href="/css/style.css">

</head>
<body>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<div id="sidebar">
  <div class="brand">
    <span class="brand-mark">KG</span>
    <span class="brand-divider"></span>
    <span class="brand-sub">Industrial Robot</span>
  </div>

  <nav>
    <a class="active" data-view="graph" onclick="switchView('graph')">
      <span class="nav-icon">&#x2261;</span> Graph
    </a>
    <a data-view="chat" onclick="switchView('chat')">
      <span class="nav-icon">&Sigma;</span> Q&A
    </a>
    <a data-view="graph" onclick="switchView('graph'); setTimeout(loadFullGraph, 100)">
      <span class="nav-icon">&#x2304;</span> Full View
    </a>
  </nav>

  <div id="graph-panels" class="visible">

    <!-- Search -->
    <div class="side-panel">
      <h4>Search Entities</h4>
      <div class="side-search">
        <input type="text" id="searchInput" placeholder="Model, brand, process..."
               onkeydown="if(event.key==='Enter')searchEntities()" />
        <button onclick="searchEntities()">Search</button>
      </div>
      <div class="node-list" id="searchResults" style="margin-top:8px;"></div>
    </div>

    <!-- Path -->
    <div class="side-panel">
      <h4>Path Query</h4>
      <div class="path-finder">
        <select id="pathSource" onchange="updatePathTarget()">
          <option value="">Select start...</option>
        </select>
        <select id="pathTarget">
          <option value="">Select target...</option>
        </select>
        <button onclick="findPath()">Shortest Path</button>
      </div>
    </div>

    <!-- Compare -->
    <div class="side-panel">
      <h4>Compare</h4>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <input type="text" id="compareA" placeholder="Entity A..." />
        <input type="text" id="compareB" placeholder="Entity B..." />
        <button onclick="compareEntities()" class="btn-secondary">Generate Report</button>
      </div>
      <div id="compareResult" style="margin-top:6px;font-size:11px;color:var(--text-dim);max-height:186px;overflow-y:auto;line-height:1.7;"></div>
    </div>

    <!-- Stats -->
    <div class="side-panel">
      <h4>Stats <button class="refresh-logs-btn" onclick="loadQuality()" style="float:right;">Quality</button></h4>
      <div class="stats-grid">
        <div class="stat-cell"><div class="val" id="statNodes">-</div><div class="lbl">Nodes</div></div>
        <div class="stat-cell"><div class="val" id="statRels">-</div><div class="lbl">Rels</div></div>
        <div class="stat-cell"><div class="val" id="statLabels">-</div><div class="lbl">Labels</div></div>
        <div class="stat-cell"><div class="val" id="statRelTypes">-</div><div class="lbl">Rel Types</div></div>
      </div>
    </div>

    <!-- Node Detail -->
    <div class="side-panel">
      <h4>Node Detail</h4>
      <div id="nodeDetail">Click a node to inspect</div>
    </div>

    <!-- Ingest -->
    <div class="side-panel">
      <h4>Data Ingest</h4>
      <div class="ingest-area">
        <textarea id="ingestText" placeholder="Paste industrial robot text...&#10;e.g. FANUC M-10iA is a 6-axis arc welding robot, 10kg payload, 1420mm reach, 0.03mm repeatability"></textarea>
        <div class="ingest-actions">
          <button class="btn-primary" onclick="ingestText()">Submit</button>
          <button class="btn-secondary" onclick="document.getElementById('ingestFile').click()">Upload File</button>
        </div>
        <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--text-dim);cursor:pointer">
          <input type="checkbox" id="ingestUseLLM" style="accent-color:var(--accent)" /> AI extraction (slower, more accurate)
        </label>
        <input type="file" id="ingestFile" accept=".csv,.pdf,.txt,.md,.dwg,.dxf,.step,.stp,.igs,.iges" onchange="ingestFile(this)" style="display:none" />
        <div class="ingest-status" id="ingestStatus"></div>
      </div>
    </div>

    <!-- Upload Log -->
    <div class="side-panel">
      <h4>Upload Log <button class="refresh-logs-btn" onclick="loadIngestLogs()" style="float:right;">Refresh</button></h4>
      <div class="log-list" id="logList">Click refresh to load</div>
    </div>

  </div>
</div>

<!-- ============================================================
     MAIN AREA
     ============================================================ -->
<div id="main">

  <!-- Graph View -->
  <div id="graph-view">
    <div id="graph-container">
      <div class="graph-loading" id="graphLoading"><div class="spinner"></div></div>
    </div>
    <div class="graph-tooltip" id="tooltip"></div>
    <div class="graph-controls">
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom –</button>
      <button onclick="resetZoom()">Reset</button>
      <button onclick="loadFullGraph()">Full</button>
    </div>
    <div class="graph-legend" id="legend"></div>
  </div>

  <!-- Chat View -->
  <div id="chat-view">
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div class="chat-input-wrap">
        <textarea id="chatInput" rows="1" placeholder="Ask about robots, parts, specs..."
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"></textarea>
        <button id="chatSendBtn" onclick="chatSend()">&uarr;</button>
      </div>
      <div class="chat-hint">Enter send · Shift+Enter newline · RAG-powered</div>
    </div>
  </div>

</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script src="/js/shared.js"></script>
<script src="/js/graph.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/ingest.js"></script>

<script>
/* ---- View Switching ---- */
function switchView(view) {
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-view="${view}"]`).classList.add('active');

  const graphView = document.getElementById('graph-view');
  const chatView  = document.getElementById('chat-view');
  const graphPanels = document.getElementById('graph-panels');

  if (view === 'chat') {
    graphView.classList.add('hidden');
    chatView.classList.add('visible');
    graphPanels.classList.remove('visible');
    if (!_chatInit) { showChatEmpty(); _chatInit = true; }
  } else {
    graphView.classList.remove('hidden');
    chatView.classList.remove('visible');
    graphPanels.classList.add('visible');
    if (!_graphInit) { initGraph(); _graphInit = true; loadStats(); }
    setTimeout(() => {
      if (simulation) { simulation.alpha(0.1).restart(); }
      const cw = document.getElementById('graph-container').clientWidth;
      const ch = document.getElementById('graph-container').clientHeight;
      d3.select('#graph-container svg').attr('width', cw).attr('height', ch);
    }, 80);
  }
}

/* ---- Init ---- */
initGraph(); _graphInit = true;
loadStats();
loadIngestLogs();
setTimeout(loadFullGraph, 300);
</script>

</body>
</html>
