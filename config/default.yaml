neo4j:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "changeme"
  database: "neo4j"
  max_connection_pool_size: 50
  connection_timeout: 30

llm:
  base_url: "http://localhost:5200/v1"
  api_key: "local"
  model: "qwen2.5-7b"
  temperature: 0.1
  max_tokens: 4096
  batch_size: 10
  max_retries: 3
  retry_delay: 2.0

extraction:
  entity_similarity_threshold: 0.85
  max_concurrent_requests: 5
  chunk_size: 2000
  chunk_overlap: 200

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module}:{function}:{line} | {message}"
  rotation: "100 MB"
  retention: "30 days"
