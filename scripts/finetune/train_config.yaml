# LLaMA-Factory training config
model_name_or_path: /media/z/data/models/Qwen2.5-7B-Instruct
dataset_dir: /data/finetune/data
dataset: kg_robot
template: qwen
finetuning_type: lora
stage: sft

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

# Quantization
quantization_method: bitsandbytes
quantization_bit: 4

# Training
output_dir: /data/finetune/llamafactory_output
overwrite_output_dir: true
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_steps: 5
num_train_epochs: 3
cutoff_len: 1024
max_grad_norm: 0.3
logging_steps: 1
save_steps: 50
save_total_limit: 3

# Precision (P100: no bf16)
fp16: true
bf16: false

# Optimizer
optim: paged_adamw_8bit
